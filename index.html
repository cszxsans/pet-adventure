let G={
  scene:'menu',

  team:[],reserve:[],discovered:[],

  battle:null,tutorial:null,
  ui:{selCell:null,capturePanel:false},sfx:true,music:true,
  particles:[],messages:[]
};

const SFX={
  _ctx:null,
  init(){try{this._ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}},
  play(t){
    if(!this._ctx)return;
    const c=this._ctx,o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    const n=c.currentTime;
    g.gain.setValueAtTime(.3,n);
    g.gain.exponentialRampToValueAtTime(.01,n+.3);
    const F={
      match:[523,659,784],
      click:[800],
      swap:[440,550],
      swap_fail:[200,150],
      attack:[200,400],
      enemy_attack:[300,150],
      levelup:[523,659,784,1047,1319],
      victory:[523,659,784,1047],
      defeat:[300,100],
      capture:[600,800,1000]
    };
    const freqs=F[t]||[440];
    const type=(t==='match'||t==='levelup'||t==='victory'||t==='capture')?'sine':
               (t==='swap'?'triangle':
               (t==='swap_fail'||t==='enemy_attack'||t==='defeat'?'sawtooth':'square'));
    o.type=type;
    freqs.forEach((f,i)=>o.frequency.setValueAtTime(f,n+i*.1));
    g.gain.exponentialRampToValueAtTime(.01,n+.5);
    o.start(n);o.stop(n+.6);
  }
};

function save(){
  localStorage.setItem('petOdyssey5',JSON.stringify({sfx:G.sfx,music:G.music,
    player:G.player,team:G.team,reserve:G.reserve,discovered:G.discovered,progress:G.progress,
  }));
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('petOdyssey5'));
    if(d){
      G.player=d.player||G.player;
      G.team=d.team||[];
      G.reserve=d.reserve||[];
      G.discovered=d.discovered||[];
      G.progress=d.progress||G.progress;G.sfx=d.sfx!==undefined?d.sfx:true;G.music=d.music!==undefined?d.music:true;
    }
  }catch(e){}
}

function makePet(id,lv){
  const b=PET_DB.find(p=>p.id===id);
  if(!b)return null;
  const s=1+(lv-1)*.12;
  return{
    ...b,lv,
    hp:Math.floor(b.hp*s),
    maxHp:Math.floor(b.hp*s),
    atk:Math.floor(b.atk*s),
    def:Math.floor(b.def*s),
    energy:0,maxEn:100,
    uid:Date.now()+Math.random()
  };
}

function wildPet(minLv,maxLv){
  const lv=minLv+Math.floor(Math.random()*(maxLv-minLv+1));
  const pool=PET_DB.filter(p=>p.r<=Math.ceil(lv/10)+1);
  return makePet(pool[Math.floor(Math.random()*pool.length)].id,lv);
}

function levelUpPet(pet){
  pet.lv++;
  pet.maxHp=Math.floor(pet.maxHp*1.15);
  pet.hp=pet.maxHp;
  pet.atk=Math.floor(pet.atk*1.12);
  pet.def=Math.floor(pet.def*1.12);
}

function calcDmg(atk,def,el_a,el_d,mult){
  mult=mult||1;
  let d=atk-def*.5;
  if(ELEM[el_a].strong===el_d)d*=1.5;
  else if(ELEM[el_d].strong===el_a)d*=.5;
  d*=mult*(0.9+Math.random()*.2);
  return Math.max(1,Math.floor(d));
}

function startBattle(chId,stage){
  const ch=CHAPTERS[chId-1];
  const sLv=ch.lv[0]+(stage-1)*((ch.lv[1]-ch.lv[0])/ch.stages);
  const n=Math.min(3,Math.ceil(stage/2)+1);
  const enemies=[];
  for(let i=0;i<n;i++)enemies.push(wildPet(Math.floor(sLv),Math.floor(sLv)+5));
  const team=G.team.map(p=>({...p,hp:p.maxHp,energy:0}));
  G.battle={ch,stage,team,enemies,ap:0,combo:0,board:genBoard(),state:'play',busy:false,turn:'player'};
  G.scene='battle';
  G.ui.selCell=null;
  G.ui.capturePanel=false;
}

function genBoard(){
  const b=[];
  for(let r=0;r<5;r++){
    b[r]=[];
    for(let c=0;c<6;c++)
      b[r][c]={el:ELEM_KEYS[Math.floor(Math.random()*5)],sel:false,del:false};
  }
  return b;
}

function findMatch(b){
  const m=[];
  for(let r=0;r<5;r++){
    for(let c=0;c<4;c++){
      if(b[r][c].el===b[r][c+1].el&&b[r][c].el===b[r][c+2].el){
        let l=3;
        while(c+l<6&&b[r][c].el===b[r][c+l].el)l++;
        m.push({t:'h',r:r,c:c,l:l,el:b[r][c].el});
        c+=l-1;
      }
    }
  }
  for(let c=0;c<6;c++){
    for(let r=0;r<3;r++){
      if(b[r][c].el===b[r+1][c].el&&b[r][c].el===b[r+2][c].el){
        let l=3;
        while(r+l<5&&b[r][c].el===b[r+l][c].el)l++;
        m.push({t:'v',r:r,c:c,l:l,el:b[r][c].el});
        r+=l-1;
      }
    }
  }
  return m;
}

function markRemove(b,m){
  const s=new Set();
  m.forEach(function(m2){
    for(let i=0;i<m2.l;i++){
      const key=m2.t==='h'?(m2.r+','+(m2.c+i)):((m2.r+i)+','+m2.c);
      s.add(key);
    }
  });
  s.forEach(function(k){
    const rc=k.split(',');
    const r=parseInt(rc[0]),c=parseInt(rc[1]);
    b[r][c].del=true;
  });
}

function gravity(b){
  for(let c=0;c<6;c++){
    let w=4;
    for(let r=4;r>=0;r--){
      if(!b[r][c].del){
        if(r!==w)b[w][c]=b[r][c];
        w--;
      }
    }
    for(let r=w;r>=0;r--)
      b[r][c]={el:ELEM_KEYS[Math.floor(Math.random()*5)],sel:false,del:false};
  }
}

function clickBoard(row,col){
  const B=G.battle;
  if(!B||B.busy||B.state!=='play'||B.turn!=='player'||G.ui.capturePanel)return;
  const board=B.board;
  if(G.ui.selCell){
    const r1=G.ui.selCell.row,c1=G.ui.selCell.col;
    board[r1][c1].sel=false;
    const adj=(Math.abs(row-r1)===1&&col===c1)||(Math.abs(col-c1)===1&&row===r1);
    if(adj){
      SFX.play('swap');
      const tmp=board[r1][c1];
      board[r1][c1]=board[row][col];
      board[row][col]=tmp;
      if(findMatch(board).length>0){
        G.ui.selCell=null;
        procMatches(B);
      }else{
        setTimeout(function(){
          const tmp2=board[r1][c1];
          board[r1][c1]=board[row][col];
          board[row][col]=tmp2;
          board[row][col].sel=false;
          G.ui.selCell=null;
          SFX.play('swap_fail');
          msg('无法消除,已还原!','#ffaa00');
        },300);
      }
    }else{
      board[row][col].sel=true;
      G.ui.selCell={row:row,col:col};
    }
  }else{
    board[row][col].sel=true;
    G.ui.selCell={row:row,col:col};
    SFX.play('click');
  }
}

function procMatches(B){
  let ms=findMatch(B.board);
  let combo=0;
  function go(){
    if(ms.length>0){
      combo++;
      B.combo=combo;
      SFX.play('match');
      markRemove(B.board,ms);
      B.ap+=ms.length;
      ms.forEach(function(m){
        B.team.forEach(function(p){
          if(p&&p.el===m.el&&p.hp>0)
            p.energy=Math.min(p.maxEn,p.energy+15*m.l);
        });
      });
      particles4Match(ms);
      msg(combo+'连击! +'+ms.length+'行动点','#ffff00');
      setTimeout(function(){
        gravity(B.board);
        setTimeout(function(){
          ms=findMatch(B.board);
          go();
        },300);
      },400);
    }else{
      B.busy=false;
      msg('行动点: '+B.ap,'#44ff44');
    }
  }
  go();
}

function useSkill(idx){
  const B=G.battle;
  if(!B)return;
  const p=B.team[idx];
  if(!p||p.hp<=0||B.busy||B.ap<=0||B.state!=='play'||B.turn!=='player')return;
  const tgt=B.enemies.find(function(e){return e.hp>0;});
  if(!tgt)return;
  B.busy=true;
  B.ap--;
  const ult=p.energy>=p.maxEn;
  const dmg=calcDmg(p.atk,tgt.def,p.el,tgt.el,ult?2.5:1);
  tgt.hp-=dmg;
  p.energy=ult?0:Math.min(p.maxEn,p.energy+10);
  msg(p.name+' '+(ult?'施放 '+p.s2:'使用 '+p.s1)+'!',ELEM[p.el].color);
  msg('造成 '+dmg+' 伤害!','#ff8800');
  SFX.play('attack');
  addPx(W/2,300,ELEM[p.el].color,20);
  if(tgt.hp<=0)msg(tgt.name+' 被击败!','#ff4444');
  setTimeout(function(){
    B.busy=false;
    if(B.enemies.every(function(e){return e.hp<=0;}))endBattle(B);
    else if(B.ap<=0){
      msg('行动点耗尽!','#ff4444');
      setTimeout(function(){endTurn(B);},500);
    }
  },500);
}

function endTurn(B){
  if(B.state!=='play')return;
  B.busy=true;
  SFX.play('endturn');
  const ae=B.enemies.filter(function(e){return e.hp>0;});
  const at=B.team.filter(function(p){return p.hp>0;});
  if(!ae.length||!at.length){
    B.busy=false;
    endBattle(B);
    return;
  }
  let i=0;
  msg('=== 敌方回合 ===','#ff0000');
  function atk(){
    if(i>=ae.length){
      B.busy=false;
      B.ap=0;
      B.combo=0;
      B.turn='player';
      if(B.state==='play')msg('=== 你的回合 ===','#44ff44');
      return;
    }
    const a=ae[i];
    const t=at[Math.floor(Math.random()*at.length)];
    if(t.hp<=0){
      i++;
      atk();
      return;
    }
    const dmg=calcDmg(a.atk,t.def,a.el,t.el);
    t.hp-=dmg;
    msg('【敌方】'+a.name+' → '+t.name+' -'+dmg,'#ff4444');
    SFX.play('enemy_attack');
    addPx(W/2,600,'#ff0000',15);
    if(t.hp<=0)msg(t.name+' 倒下了! 😢','#ff4444');
    setTimeout(function(){
      i++;
      atk();
    },800);
  }
  setTimeout(atk,500);
}

function endBattle(B){
  if(B.enemies.filter(function(e){return e.hp>0;}).length===0){
    B.state='win';
    SFX.play('victory');
    const coins=(50+50*(B.stage-1))+B.combo*5; // harder stage = more coins
    const scrolls=1+Math.floor(B.stage/2);
    G.player.coins+=coins;
    G.player.scrolls+=scrolls;
    msg('🎉 胜利! +'+coins+'金币 +'+scrolls+'升级卷','#ffd700');
    B.team.forEach(function(p){
      const orig=G.team.find(function(t){return t.uid===p.uid;});
      if(orig){
        orig.hp=Math.min(p.hp,orig.maxHp);
        orig.energy=p.energy;
      }
    });
    if(B.stage<CHAPTERS[B.ch.id-1].stages)
      G.progress.hiSt=Math.max(G.progress.hiSt,B.stage+1);
    else{
      G.progress.hiCh=Math.max(G.progress.hiCh,B.ch.id+1);
      G.progress.hiSt=1;
    }
    save();
  }else if(B.team.every(function(p){return p.hp<=0;})){
    B.state='lose';
    SFX.play('defeat');
    msg('💀 失败...','#ff4444');
  }
}

// ========== 战斗中捕捉系统 ==========
function attemptCapture(type){
  const B=G.battle;
  if(!B||B.state!=='play'||B.turn!=='player'||B.busy)return;
  
  const aliveEnemies=B.enemies.filter(function(e){return e.hp>0;});
  if(aliveEnemies.length===0){
    msg('没有可捕捉的目标!','#ffaa00');
    return;
  }
  
  const apCost={normal:4,super:3,master:1}[type];
  if(B.ap<apCost){
    msg('行动点不足! 需要'+apCost+'点','#ffaa00');
    return;
  }
  if(G.player.balls[type]<=0){
    msg('没有这种球了!','#ffaa00');
    return;
  }
  
  G.player.balls[type]--;
  B.ap-=apCost;
  B.busy=true;
  G.ui.capturePanel=false;
  
  const tgt=aliveEnemies[Math.floor(Math.random()*aliveEnemies.length)];
  const baseRate={normal:0.30,super:0.50,master:0.85}[type];
  const hpFactor=tgt.hp/tgt.maxHp;
  const rate=baseRate*(1.8-hpFactor*1.5);
  
  const ballName=type==='normal'?'普通球':(type==='super'?'超级球':'大师球');
  msg('使用'+ballName+'捕捉 '+tgt.name+'...消耗'+apCost+'AP','#ffaa00');
  SFX.play('click');
  
  setTimeout(function(){
    if(Math.random()<rate){
      msg('🎉 捕捉 '+tgt.name+' 成功!','#44ff44');
      SFX.play('capture');
      addPet(tgt);
      const idx=B.enemies.indexOf(tgt);
      if(idx>=0)B.enemies.splice(idx,1);
      setTimeout(function(){
        B.busy=false;
        if(B.enemies.filter(function(e){return e.hp>0;}).length===0)
          endBattle(B);
        else
          msg('还有敌人! 继续!','#44ff44');
      },800);
    }else{
      msg(tgt.name+' 逃出了!','#ff4444');
      SFX.play('swap_fail');
      B.busy=false;
    }
  },600);
}

function addPet(p){
  if(!G.discovered.includes(p.id))G.discovered.push(p.id);
  if(G.team.length<MAX_TEAM)
    G.team.push(p);
  else
    G.reserve.push(p);
  save();
}

// ========== 渲染工具 ==========
function rr(x,y,w,h,r){
  X.beginPath();
  X.moveTo(x+r,y);
  X.lineTo(x+w-r,y);
  X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r);
  X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  X.lineTo(x+r,y+h);
  X.quadraticCurveTo(x,y+h,x,y+h-r);
  X.lineTo(x,y+r);
  X.quadraticCurveTo(x,y,x+r,y);
  X.closePath();
}

function btn(label,x,y,w,h,bg,fg,bc){
  X.fillStyle=bg||'#2a2a4a';
  rr(x,y,w,h,12);
  X.fill();
  X.strokeStyle=bc||'#f5a623';
  X.lineWidth=2;
  rr(x,y,w,h,12);
  X.stroke();
  X.fillStyle=fg||'#fff';
  X.font='bold 24px sans-serif';
  X.textAlign='center';
  X.fillText(label,x+w/2,y+h/2+8);
}

function hpBar(x,y,w,h,cur,mx,c){
  const r=Math.max(0,cur/mx);
  X.fillStyle='#333';
  rr(x,y,w,h,5);
  X.fill();
  X.fillStyle=r<.3?'#ff4444':(c||'#44ff44');
  rr(x,y,w*r,h,5);
  X.fill();
}

function enBar(x,y,w,h,cur,mx){
  const r=Math.min(1,cur/mx);
  X.fillStyle='#333';
  rr(x,y,w,h,4);
  X.fill();

function shade(c,p){
  const n=parseInt(c.replace('#',''),16);
  const a=Math.round(2.55*p);
  const R=Math.min(255,Math.max(0,(n>>16)+a));
  const G2=Math.min(255,Math.max(0,((n>>8)&0xFF)+a));
  const B=Math.min(255,Math.max(0,(n&0xFF)+a));
  return'#'+(0x1000000+R*0x10000+G2*0x100+B).toString(16).slice(1);
}

function rBoard(board){
  const cs=70,pd=8,bw=6*cs+7*pd,bh=5*cs+6*pd;
  const sx=(W-bw)/2,sy=310;
  
  X.fillStyle='rgba(0,0,0,.35)';
  rr(sx-8,sy-8,bw+16,bh+16,14);
  X.fill();
  
  for(let r=0;r<5;r++){
    for(let c=0;c<6;c++){
      const cell=board[r][c];
      const x=sx+c*(cs+pd)+pd;
      const y=sy+r*(cs+pd)+pd;
      
      X.fillStyle='rgba(255,255,255,.08)';
      rr(x,y,cs,cs,8);
      X.fill();
      
      if(!cell.del){
        if(cell.sel){
          X.strokeStyle='#fff';
          X.lineWidth=3;
          rr(x-2,y-2,cs+4,cs+4,10);
          X.stroke();
        }
        
        const cl=ELEM[cell.el].color;
        const g=X.createRadialGradient(x+cs/2-10,y+cs/2-10,0,x+cs/2,y+cs/2,cs/2);
        g.addColorStop(0,'#fff');
        g.addColorStop(.3,cl);
        g.addColorStop(1,shade(cl,-30));
        X.fillStyle=g;
        X.beginPath();
        X.arc(x+cs/2,y+cs/2,cs/2-4,0,Math.PI*2);
        X.fill();
        
        X.fillStyle='#fff';
        X.font='bold 24px sans-serif';
        X.textAlign='center';
        X.fillText(ELEM[cell.el].name,x+cs/2,y+cs/2+8);
      }
    }
  }
}

    if(p.life<=0)return false;
    X.fillStyle=p.color;
    X.globalAlpha=p.life/p.maxL;
    X.beginPath();
    X.arc(p.x,p.y,p.sz,0,Math.PI*2);
    X.fill();
    X.globalAlpha=1;
    return true;
  });
}

];

function rTutorial(){
  if(!G.tutorial||G.tutorial.done)return;
  var step=TIPS[G.tutorial.step];
  // Full screen overlay
  X.fillStyle='rgba(0,0,0,0.85)';
  X.fillRect(0,0,W,H);
  // Card background - centered on screen
  var cardW=Math.min(320,W*0.85), cardH=Math.min(340,H*0.55);
  var cardX=W/2-cardW/2, cardY=H/2-cardH/2;
  X.fillStyle='#1a1a2e';
  rr(cardX,cardY,cardW,cardH,16);
  X.fill();
  X.strokeStyle='#f5a623';
  X.lineWidth=2;
  rr(cardX,cardY,cardW,cardH,16);
  X.stroke();
  // Step dots
  var dotY=cardY+20;
  var dotSpacing=Math.min(28,W*0.04);
  TIPS.forEach(function(_,i){
    X.beginPath();
    X.arc(W/2-dotSpacing*(TIPS.length-1)/2+i*dotSpacing,dotY,Math.max(4,Math.min(7,W*0.015)),0,Math.PI*2);
    X.fillStyle=i===G.tutorial.step?'#f5a623':'#555';
    X.fill();
  });
  // Title text
  var fontSize=Math.min(28,Math.max(18,W*0.045));
  X.fillStyle='#fff';
  X.font='bold '+fontSize+'px sans-serif';
  X.textAlign='center';
  X.fillText(step.text,W/2,cardY+60);
  // Sub text with word wrap
  var subFontSize=Math.min(18,Math.max(13,W*0.032));
  X.fillStyle='#ccc';
  X.font=subFontSize+'px sans-serif';
  if(step.sub){
    var maxTextW=cardW-30;
    var words=step.sub.split(' ');
    var line='';
    var lineY=cardY+95;
    for(var w=0;w<words.length;w++){
      var test=line+words[w]+' ';
      if(X.measureText(test).width>maxTextW&&line!==''){
        X.fillText(line.trim(),W/2,lineY);
        lineY+=subFontSize+6;
        line=words[w]+' ';
      }else{
        line=test;
      }
    }
    X.fillText(line.trim(),W/2,lineY);
  }
  // BIG button - clearly visible in center-bottom of card
  var bw=Math.min(200,cardW*0.7), bh=Math.min(52,cardH*0.14);
  var bx=W/2-bw/2, by=cardY+cardH-bh-20;
  btn(step.btn||'下一步',bx,by,bw,bh,'#f5a623','#fff','#d4881a');
}

function hTutorial(mx,my){
  if(!G.tutorial||G.tutorial.done)return;
  var step=TIPS[G.tutorial.step];
  var cardW=Math.min(320,W*0.85), cardH=Math.min(340,H*0.55);
  var cardX=W/2-cardW/2, cardY=H/2-cardH/2;
  var bw=Math.min(200,cardW*0.7), bh=Math.min(52,cardH*0.14);
  var bx=W/2-bw/2, by=cardY+cardH-bh-20;
  if(mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh){
    SFX.play('click');
    G.tutorial.step++;
    if(G.tutorial.step>=TIPS.length){
      G.tutorial.done=true;
      G.scene='battle';
    }
  }
}

function handleClick(mx,my){
  if(G.tutorial&&!G.tutorial.done){hTutorial(mx,my);return;}
  if(G.scene==='menu')hMenu(mx,my);
  else if(G.scene==='map')hMap(mx,my);
  else if(G.scene==='battle')hBattle(mx,my);
  else if(G.scene==='dict')hDict(mx,my);
  else if(G.scene==='team')hTeam(mx,my);
  else if(G.scene==='shop')hShop(mx,my);
  else if(G.scene==='settings')hSettings(mx,my);
}

function hMenu(mx,my){
  const bs=[['map',600],['dict',720],['team',840],['shop',960]];
  bs.forEach(function(b){
    if(mx>=W/2-150&&mx<=W/2+150&&my>=b[1]&&my<=b[1]+80){
      SFX.play('click');
      G.scene=b[0];
    }
  });
  if(G.scene==='menu'&&mx>=W-90&&mx<=W-5&&my>=20&&my<=65)G.scene='settings';
}

function hMap(mx,my){
  if(mx>=20&&mx<=120&&my>=20&&my<=70){G.scene='menu';return;}
  CHAPTERS.forEach(function(ch,i){
    const y=110+i*190;
    if(mx>=60&&mx<=W-60&&my>=y&&my<=y+150&&ch.id<=G.progress.hiCh){
      SFX.play('click');
      if(!G.tutorial)startTutorial();
      startBattle(ch.id,ch.id===G.progress.hiCh?G.progress.hiSt:1);
    }
  });
}

function hBattle(mx,my){
  const B=G.battle;
  if(!B)return;
  
  // 捕捉面板
  if(G.ui.capturePanel){
    var balls=[{t:'normal',ap:4},{t:'super',ap:3},{t:'master',ap:1}];
    var panelW=Math.min(400,W*0.85);
    var panelX=(W-panelW)/2;
    var itemH=Math.min(70,Math.max(50,H*0.08));
    balls.forEach(function(b,i){
      var by=H*0.4+i*(itemH+8);
      if(mx>=panelX+10&&mx<=panelX+panelW-10&&my>=by&&my<=by+itemH)
        attemptCapture(b.t);
    });
    var btnW=Math.min(160,W*0.4),btnH=Math.min(50,H*0.06);
    if(mx>=W/2-btnW/2&&mx<=W/2+btnW/2&&my>=H*0.72&&my<=H*0.72+btnH)
      G.ui.capturePanel=false;
    return;
  }
  
  // 结果
  if(B.state!=='play'){
    G.scene='map';
    G.battle=null;
    return;
  }
  
  // 捕捉按钮
  if(mx>=20&&mx<=150&&my>=H-80&&my<=H-25&&B.turn==='player'&&!B.busy&&B.ap>=1){
    G.ui.capturePanel=true;
    SFX.play('click');
    return;
  }
  
  // 结束回合
  if(mx>=W-170&&mx<=W-20&&my>=H-80&&my<=H-25&&B.turn==='player'&&!B.busy){
    SFX.play('click');
    endTurn(B);
    return;
  }
  
  // 棋盘
  const cs=70,pd=8,bw=6*cs+7*pd;
  const sx2=(W-bw)/2,sy2=310;
  for(let r=0;r<5;r++){
    for(let c=0;c<6;c++){
      const cx=sx2+c*(cs+pd)+pd;
      const cy=sy2+r*(cs+pd)+pd;
      if(mx>=cx&&mx<=cx+cs&&my>=cy&&my<=cy+cs){
        clickBoard(r,c);
        return;
      }
    }
  }
  
  // 宠物技能
  const n=B.team.length;
  const pw=Math.min(125,(W-30-(n-1)*8)/n);
  const sp=8;
  const tsx=(W-n*pw-(n-1)*sp)/2;
  const tsy=810;
  
  B.team.forEach(function(p,i){
    if(!p)return;
    const px=tsx+i*(pw+sp);
    if(mx>=px&&mx<=px+pw&&my>=tsy&&my<=tsy+180&&p.hp>0&&B.turn==='player'&&!B.busy){
      if(B.ap>0)
        useSkill(i);
      else
        msg('没有行动点!','#ffaa00');
    }
  });
}

function hDict(mx,my){
  if(mx>=20&&mx<=120&&my>=20&&my<=70){G.scene='menu';return;}
}

function hTeam(mx,my){
  if(mx>=20&&mx<=120&&my>=20&&my<=70){G.scene='menu';return;}
  
  G.team.forEach(function(p,i){
    const y=135+i*85;
    const w=W-60;
    if(G.player.scrolls>0&&mx>=w-80&&mx<=w-15&&my>=y+8&&my<=y+36){
      G.player.scrolls--;
      levelUpPet(p);
      SFX.play('levelup');
      msg(p.name+' 升级到 Lv'+p.lv+'! 🎉','#44ff44');
      save();
      return;
    }
    if(G.reserve.length>0&&mx>=w-80&&mx<=w-15&&my>=y+42&&my<=y+70){
      G.reserve.push(G.team.splice(i,1)[0]);
      save();
      SFX.play('click');
      msg('已换下','#ffaa00');
      return;
    }
  });
  
  G.reserve.forEach(function(p,i){
    const y=595+i*85;
    const w=W-60;
    if(y>H-120)return;
    if(G.player.scrolls>0&&mx>=w-80&&mx<=w-15&&my>=y+8&&my<=y+36){
      G.player.scrolls--;
      levelUpPet(p);
      SFX.play('levelup');
      msg(p.name+' 升级到 Lv'+p.lv+'! 🎉','#44ff44');
      save();
      return;
    }
    if(G.team.length<MAX_TEAM&&mx>=w-80&&mx<=w-15&&my>=y+42&&my<=y+70){
      G.team.push(G.reserve.splice(i,1)[0]);
      save();
      SFX.play('click');
      msg('已换上','#44ff44');
      return;
    }
  });
}

function hShop(mx,my){
  if(mx>=20&&mx<=120&&my>=20&&my<=70){G.scene='menu';return;}
  
  SHOP.forEach(function(item,i){
    const y=120+i*120;
    const x=50;
    const w=W-100;
    if(mx>=x+w-90&&mx<=x+w-15&&my>=y+52&&my<=y+88&&G.player.coins>=item.price){
      G.player.coins-=item.price;
      if(item.type==='ball_normal')G.player.balls.normal++;
      else if(item.type==='ball_super')G.player.balls.super++;
      else if(item.type==='ball_master')G.player.balls.master++;
      SFX.play('click');
      msg('购买 '+item.name+'!','#44ff44');
      save();
    }
  });
}

// ========== 主循环 ==========
function loop(){
  render();
  requestAnimationFrame(loop);
}


function rSettings(){
  X.fillStyle='#1a1a2e';X.fillRect(0,0,W,H);
  X.fillStyle='#f5a623';X.font='bold 40px sans-serif';X.textAlign='center';X.fillText('设置',W/2,60);
  
  // 音量
  X.fillStyle='#fff';X.font='24px sans-serif';X.textAlign='left';X.fillText('音效音量',60,150);
  X.fillStyle='#333';rr(60,165,300,30,8);X.fill();
  X.fillStyle='#f5a623';rr(60,165,G.sfx?300:0,30,8);X.fill();
  X.fillStyle='#ffd700';X.font='20px sans-serif';X.textAlign='center';X.fillText(G.sfx?'开':'关',210,188);
  
  // 音效滑块按钮
  btn(G.sfx?'音量+':'音量-',380,160,100,40,G.sfx?'rgba(76,175,80,.8)':'rgba(255,100,100,.8)','#fff');
  
  // 音乐
  X.fillStyle='#fff';X.font='24px sans-serif';X.textAlign='left';X.fillText('音乐',60,260);
  X.fillStyle='#333';rr(60,275,300,30,8);X.fill();
  X.fillStyle='#f5a623';rr(60,275,G.music?300:0,30,8);X.fill();
  X.fillStyle='#ffd700';X.font='20px sans-serif';X.textAlign='center';X.fillText(G.music?'开':'关',210,298);
  
  btn(G.music?'音乐+':'音乐-',380,270,100,40,G.music?'rgba(76,175,80,.8)':'rgba(255,100,100,.8)','#fff');
  
  // 重置存档
  btn('⚠ 重置存档',W/2-100,400,200,50,'rgba(255,80,80,.8)','#fff','#ff4444');
  
  // 返回按钮
  btn('返回',20,20,100,50,'#333','#fff','#555');
}

function hSettings(mx,my){
  // 返回按钮
  if(mx>=20&&mx<=120&&my>=20&&my<=70){G.scene='menu';return;}
  // 音量开关
  if(mx>=380&&mx<=480&&my>=160&&my<=200){
    G.sfx=!G.sfx;save();SFX.play('click');return;
  }
  // 音乐开关
  if(mx>=380&&mx<=480&&my>=270&&my<=310){
    G.music=!G.music;save();SFX.play('click');return;
  }
  // 重置存档
  if(mx>=W/2-100&&mx<=W/2+100&&my>=400&&my<=450){
    if(confirm('确定要重置所有存档吗？此操作不可撤销！')){
      localStorage.removeItem('petOdyssey5');
      location.reload();
    }
  }
  // old return removed
}

function init(){
  SFX.init();
  load();
  if(!G.team.length){
    G.team=[makePet(1,5),makePet(5,5)];
    G.discovered=[1,5];
    save();
  }
  loop();
}

init();
</script>
